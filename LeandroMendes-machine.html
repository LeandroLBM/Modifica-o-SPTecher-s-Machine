<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPTecher's Machine</title>
</head>
<style>
    body {
        background-image: linear-gradient(To top, #152331, #000000);
        background-attachment: fixed;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
    }

    button {
        border-style: solid;
        border-color: white;
        background-image: linear-gradient(To top, #8E2DE2, #4A00E0);
        color: white;
        border-radius: 25px;
    }

    input {
        border-style: solid;
        border-color: white;
        background-color: #0f0f0f;
        color: white;
        border-radius: 5px;
    }

    #demo2 {
        display: none;
        border-style: solid;
        border-color: white;
        width: 250px;
        border-radius: 5px;
    }

    #table {
        border: 2px solid white;
        display: none;
        width: 752px;
        border-radius: 5px;
        text-align: center;
    }

    table,
    th,
    td {
        border: 1px solid white;
        border-collapse: collapse;
        width: 500px;
    }
</style>

<body>
    <center>
        <h1>SPTecher's Machine</h1>
        <b>Digite um número decimal</b><br>
        <input id="demo1" type="number" placeholder="Ex: 42">
        <br><br>
        <button onclick="converter()"><b>Converter</b></button>
        <button onclick="tabela()" id="button_table"><b>Tabela</b></button>
        <p>
        <div id="table">
            <table>
                <tr><b>Tabela elevação do número 2</b></tr>
                <tr>
                    <th>2^(0)</th>
                    <th>2^(1)</th>
                    <th>2^(2)</th>
                    <th>2^(3)</th>
                    <th>2^(4)</th>
                    <th>2^(5)</th>
                    <th>2^(6)</th>
                    <th>2^(7)</th>
                    <th>2^(8)</th>
                    <th>2^(9)</th>
                    <th>2^(10)</th>
                    <th>2^(11)</th>
                    <th>2^(12)</th>
                    <th>2^(13)</th>
                    <th>2^(14)</th>
                    <th>2^(15)</th>
                    <th>2^(16)</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>2</td>
                    <td>4</td>
                    <td>8</td>
                    <td>16</td>
                    <td>32</td>
                    <td>64</td>
                    <td>128</td>
                    <td>256</td>
                    <td>512</td>
                    <td>1024</td>
                    <td>2048</td>
                    <td>4096</td>
                    <td>8192</td>
                    <td>16384</td>
                    <td>32768</td>
                    <td>65536</td>
                </tr>
            </table>
        </div>
        <p>
    </center>
    <div id="demo2"></div>
    <p></p>
    <script>
        let valor = 0
        function converter() {
            var decimal = Number(demo1.value);
            if (decimal == ``) {
                alert(`Informe um valor!`)
            }
            else if (decimal == valor) {
                alert(`Informe outro valor!`)
            }
            else {
                document.getElementById(`demo2`).style.display = `block`;
                valor = (valor - valor) + decimal
                demo2.innerHTML += `<center>
               <b> O Resultados com número
                <span style = "color: red";>${decimal}</center></span></b><br>
                • Octal: <span style = "color: yellow";>${decimal.toString(8)}</span> <br>
                • Hexadecimal: <span style = "color: yellow";>${decimal.toString(16)}</span> <br>
                • Binário: <span style = "color: yellow";>${decimal.toString(2)}</span>`
            }
        }
        function tabela() {
            if (document.getElementById(`table`).style.display == `block`) {
                document.getElementById(`table`).style.display = `none`
            } else {
                document.getElementById(`table`).style.display = `block`
            }
        }
    </script>
</body>

</html>
